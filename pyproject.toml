[build-system]
requires = ["setuptools>=80", "setuptools-scm[simple]>=8"]

[project]
name = "hallmark"
dynamic = ["version"]
license = "Apache-2.0"
dependencies =[
    "click",
    "GitPython",
    "pandas",
    "pyyaml",
]

[project.scripts]
hallmark = "hallmark.cli:hallmark"

[tool.setuptools.packages.find]
where = ["mod"]
